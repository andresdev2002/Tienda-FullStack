<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ventas</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <div class="container">

        <h1>Registrar Venta</h1>

        <form id="ventaForm">

            <input
                type="number"
                id="producto_id"
                placeholder="ID Producto"
                required
            >

            <input
                type="number"
                id="cantidad"
                placeholder="Cantidad"
                required
            >

            <button type="submit">
                Registrar venta
            </button>

        </form>

        <p id="mensaje"></p>

    </div>

    <script src="../js/api.js"></script>

    <script src="../js/ventas.js"></script>

</body>
</html>
