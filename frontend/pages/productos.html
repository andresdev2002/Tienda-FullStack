<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Productos</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <div class="container">

        <h1>Productos</h1>

        <!-- ========================= -->
        <!-- FORMULARIO -->
        <!-- ========================= -->
        <form id="productoForm">

            <input
                type="text"
                id="nombre"
                placeholder="Nombre"
                required
            >

            <input
                type="number"
                id="precio"
                placeholder="Precio"
                required
            >

            <input
                type="number"
                id="stock"
                placeholder="Stock"
                required
            >

            <button type="submit">
                Crear producto
            </button>

        </form>

        <hr>

        <!-- ========================= -->
        <!-- TABLA -->
        <!-- ========================= -->
        <table border="1" width="100%">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>

                </tr>

            </thead>

            <tbody id="productosBody">

            </tbody>

        </table>

    </div>

    <script src="../js/api.js"></script>

    <script src="../js/productos.js"></script>

</body>
</html>
