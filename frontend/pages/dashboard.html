<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/Dashboar.css">

</head>

<body>

    <div class="container">

        <h1>Dashboard</h1>

        <!-- ========================= -->
        <!-- MÉTRICAS -->
        <!-- ========================= -->

        <div class="cards">

            <div class="card">

                <h2>Ingresos Totales</h2>

                <p id="ingresos">0</p>

            </div>

            <div class="card">

                <h2>Número de Ventas</h2>

                <p id="ventas">0</p>

            </div>

            <div class="card">

                <h2>Producto Más Vendido</h2>

                <p id="producto">-</p>

            </div>

        </div>

        <hr>

        <!-- ========================= -->
        <!-- FILTRO -->
        <!-- ========================= -->

        <h2>Filtrar productos por precio</h2>

        <form id="filtroForm">

            <input
                type="number"
                id="min_precio"
                placeholder="Precio mínimo"
                required
            >

            <input
                type="number"
                id="max_precio"
                placeholder="Precio máximo"
                required
            >

            <button type="submit">
                Filtrar
            </button>

        </form>

        <ul id="listaProductos"></ul>

    </div>

    <script src="../js/api.js"></script>

    <script src="../js/reportes.js"></script>

</body>
</html>
