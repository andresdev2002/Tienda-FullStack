<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form id="loginForm">

            <input 
                type="text"
                id="username"
                placeholder="Usuario"
                required
            >

            <input 
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Iniciar sesión
            </button>

        </form>

        <p id="mensaje"></p>

    </div>

    <script src="../js/api.js"></script>

    <script src="../js/auth.js"></script>

</body>
</html>
